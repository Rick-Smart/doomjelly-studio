<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DoomJelly Studio</title>
    <script>
      // GitHub Pages SPA redirect:
      // Encode the full path as a query param so index.html can restore it.
      var segmentCount = 1; // number of path segments in the repo basename (/doomjelly-studio)
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?p=/" +
          l.pathname
            .split("/")
            .slice(1 + segmentCount)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
